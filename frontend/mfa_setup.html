<!DOCTYPE html>
<html>
<head>
    <title>Setup MFA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <h2>Setup MFA</h2>

    <p id="msg"></p>

    <button onclick="generateQR()">Generate QR</button>

    <div style="margin-top: 12px;">
        <img id="qrImage" style="max-width: 240px; display:none;">
    </div>

    <div style="margin-top: 14px;">
        <button id="continueBtn" onclick="goToOtp()" style="display:none;">Continue to OTP Verification</button>
    </div>
</div>

<script>
// Safety redirect:
// This page should only be opened when user clicks "Setup MFA" explicitly.
// Automatic step-up redirects must land on OTP page first.
const params = new URLSearchParams(window.location.search);
if (params.get("manual") !== "1") {
    window.location.href = "mfa.html";
}

function getUserIdForSetup(){
    // If user is already logged in, use the JWT (sub is always a string in JWT).
    const token = localStorage.getItem("access_token");
    if(token){
        try{
            const payload = JSON.parse(atob(token.split('.')[1]));
            if(payload && payload.sub != null) return parseInt(String(payload.sub), 10);
        }catch(e){}
    }
    const mfaUser = localStorage.getItem("mfa_user");
    if(mfaUser) return parseInt(mfaUser, 10);
    return null;
}

async function generateQR(){
    const mfaAuthToken = (
        localStorage.getItem("pending_mfa_token") || localStorage.getItem("access_token") || ""
    ).trim();
    if(!mfaAuthToken){
        document.getElementById("msg").innerText = "No MFA session token found. Please login again.";
        return;
    }

    const res = await fetch("/mfa/setup",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + mfaAuthToken
        },
        body:JSON.stringify({
            mfa_context_token: mfaAuthToken
        })
    });

    let data = {};
    try {
        data = await res.json();
    } catch (e) {
        data = {};
    }

    if(!res.ok){
        let err = data.detail;
        if (err && typeof err === "object") err = JSON.stringify(err);
        document.getElementById("msg").innerText = err || ("Failed to generate QR code (" + res.status + "). If 401, log in again — MFA setup session may have expired (60 min).");
        return;
    }

    if(data.qr_code_base64){
        const img = document.getElementById("qrImage");
        img.src = "data:image/png;base64," + data.qr_code_base64;
        img.style.display = "block";
        document.getElementById("continueBtn").style.display = "inline-block";
        document.getElementById("msg").innerText = "Scan this QR in your authenticator app, then continue to OTP verification.";
    }else{
        document.getElementById("msg").innerText = data.detail || "Failed to generate QR code.";
    }
}

function goToOtp(){
    localStorage.removeItem("mfa_setup_required");
    window.location.href = "mfa.html";
}
</script>

<div id="zta-notify-container"></div>
<script src="zta_notify.js"></script>
</body>
</html>
