<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email OTP Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css?v=4" />
  <script src="zta_notify.js"></script>
</head>

<body class="login-body">
  <div class="container">
    <h1>Email OTP Verification</h1>
    <p class="desc">Enter the 6-digit code sent to your registered email.</p>

    <div class="otp-grid" id="otpGrid">
      <input class="otp-box" maxlength="1" inputmode="numeric" />
      <input class="otp-box" maxlength="1" inputmode="numeric" />
      <input class="otp-box" maxlength="1" inputmode="numeric" />
      <input class="otp-box" maxlength="1" inputmode="numeric" />
      <input class="otp-box" maxlength="1" inputmode="numeric" />
      <input class="otp-box" maxlength="1" inputmode="numeric" />
    </div>

    <div class="buttons" style="margin-top: 14px;">
      <button id="resendBtn" class="secondary" type="button">Resend OTP</button>
      <button id="verifyBtn" class="primary" type="button">Verify</button>
    </div>

    <div id="message" class="message info">Requesting OTP…</div>
  </div>

  <div id="zta-notify-container"></div>

  <script>
    function setMessage(text, type = "info") {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = "message " + type;
    }

    function getPendingMfaToken() {
      return (localStorage.getItem("pending_mfa_token") || "").trim();
    }

    function readOtp() {
      const inputs = Array.from(document.querySelectorAll(".otp-box"));
      return inputs.map(i => (i.value || "").trim()).join("");
    }

    function wireOtpInputs() {
      const inputs = Array.from(document.querySelectorAll(".otp-box"));
      inputs.forEach((inp, idx) => {
        inp.addEventListener("input", () => {
          inp.value = (inp.value || "").replace(/[^0-9]/g, "").slice(0, 1);
          if (inp.value && idx < inputs.length - 1) inputs[idx + 1].focus();
        });
        inp.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !inp.value && idx > 0) inputs[idx - 1].focus();
        });
      });
      if (inputs[0]) inputs[0].focus();
    }

    async function requestOtp() {
      const pending = getPendingMfaToken();
      if (!pending) {
        setMessage("Session expired. Please login again.", "error");
        window.location.href = "login.html";
        return;
      }

      setMessage("Sending OTP to your email…", "warning");
      const res = await fetch("/mfa/email/request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mfa_context_token: pending })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setMessage(data.detail || ("Failed to send OTP (" + res.status + ")"), "error");
        return;
      }

      if (data.debug_otp) {
        setMessage("OTP sent (debug): " + data.debug_otp, "warning");
      } else {
        setMessage("OTP sent. Please enter it below.", "info");
      }
    }

    async function verifyOtp() {
      const pending = getPendingMfaToken();
      if (!pending) {
        setMessage("Session expired. Please login again.", "error");
        window.location.href = "login.html";
        return;
      }

      const otp = readOtp();
      if (!otp || otp.length !== 6) {
        setMessage("Please enter the 6-digit OTP.", "error");
        return;
      }

      setMessage("Verifying OTP…", "warning");
      const res = await fetch("/mfa/email/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ otp, mfa_context_token: pending })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setMessage(data.detail || ("Invalid OTP (" + res.status + ")"), "error");
        return;
      }

      if (data.access_token) {
        localStorage.setItem("access_token", data.access_token);
        localStorage.removeItem("pending_mfa_token");
        localStorage.removeItem("mfa_user");
        localStorage.removeItem("login_risk_score");

        setMessage("Email OTP verified. Redirecting…", "success");
        const redirectTo = localStorage.getItem("post_auth_redirect") || "dashboard.html";
        localStorage.removeItem("post_auth_redirect");
        setTimeout(() => window.location.href = redirectTo, 600);
        return;
      }

      setMessage(data.detail || "OTP verification failed.", "error");
    }

    document.getElementById("resendBtn").addEventListener("click", async () => {
      if (typeof ztaNotify === "function") ztaNotify("Resending OTP…", "warning");
      await requestOtp();
    });
    document.getElementById("verifyBtn").addEventListener("click", async () => {
      if (typeof ztaNotify === "function") ztaNotify("Verifying OTP…", "warning");
      await verifyOtp();
    });

    wireOtpInputs();
    requestOtp();
  </script>
</body>
</html>
