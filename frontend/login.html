<!DOCTYPE html>
<html>
<head>
    <title>ZTA Login</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="zta_notify.js"></script>
</head>
<body class="login-body">

<div class="login-container">
    <h2>ZTA Secure Login</h2>

    <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <button type="submit" id="loginBtn">Login</button>
    </form>

    <p id="message"></p>
</div>
<div id="zta-notify-container"></div>

<script>

let isSubmitting = false;

document.getElementById("loginForm").onsubmit = async function(e) {

    e.preventDefault();

    if (isSubmitting) return;
    isSubmitting = true;
    document.getElementById("loginBtn").disabled = true;

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    ztaNotify("Sending login request to server...", "success");

    let data = null;

    try {

        const response = await fetch("/api/login", {
            method: "POST",
            cache: "no-store",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const raw = await response.text();
        try {
            data = raw ? JSON.parse(raw) : {};
        } catch (parseErr) {
            // Backend may return plain text on 500; keep message useful.
            throw new Error(raw || ("Server returned non-JSON response (" + response.status + ")"));
        }

        if (!response.ok && !data.status) {
            throw new Error(data.detail || "Server returned " + response.status);
        }

    } catch (error) {

        console.error(error);

        ztaNotify("Backend connection failed: " + error.message, "error");

        isSubmitting = false;
        document.getElementById("loginBtn").disabled = false;
        return;
    }

    // Step-up responses may include access_token (e.g. manager poll JWT). Check
    // status *before* treating any token as full dashboard access.

    // ==========================
    // MANAGER APPROVAL REQUIRED
    // ==========================

    if (data.status === "manager_approval_required" || data.approval_pending) {

        ztaNotify("Critical risk detected. Manager approval required", "error");

        if (data.access_token) {
            localStorage.setItem("access_token", data.access_token);
            // Tab-scoped: another tab logging in as the manager must not overwrite this.
            sessionStorage.setItem("approval_poll_token", data.access_token);
        }
        if (data.risk_score != null) {
            localStorage.setItem("login_risk_score", data.risk_score);
        }

        window.location.href = "approval_wait.html";
        return;
    }

    // ==========================
    // MFA REQUIRED
    // ==========================

    if (data.status === "mfa_required") {

        localStorage.setItem("mfa_user", data.user_id);
        localStorage.setItem("login_risk_score", data.risk_score || 0);
        if (data.pending_mfa_token) {
            localStorage.setItem("pending_mfa_token", data.pending_mfa_token);
        } else {
            ztaNotify("MFA error: missing session token from server. Restart backend and try again.", "error");
        }

        ztaNotify("Risk detected. MFA verification required", "warning");

        window.location.href = "mfa.html";
        return;
    }

    // ==========================
    //  MFA_SETUP REQUIRED
    // ==========================

    if (data.status === "mfa_setup_required") {

        localStorage.setItem("mfa_user", data.user_id);
        localStorage.setItem("login_risk_score", data.risk_score || 0);
        if (data.pending_mfa_token) {
            localStorage.setItem("pending_mfa_token", data.pending_mfa_token);
        } else {
            ztaNotify("MFA error: missing session token from server. Restart backend and try again.", "error");
        }

        // UX requirement: land on OTP page first, but show the setup CTA.
        localStorage.setItem("mfa_setup_required", "1");
        ztaNotify("You haven't setup mfa please set up mfa.", "warning");
        window.location.href = "mfa.html";
        return;
    }


    // ==========================
    // STRONG MFA REQUIRED
    // ==========================

    if (data.status === "strong_mfa_required") {

        localStorage.setItem("mfa_user", data.user_id);
        localStorage.setItem("login_risk_score", data.risk_score || 0);
        if (data.pending_mfa_token) {
            localStorage.setItem("pending_mfa_token", data.pending_mfa_token);
        } else {
            ztaNotify("MFA error: missing session token from server. Restart backend and try again.", "error");
        }

        ztaNotify(data.message || "Strong MFA required. Risk score is high.", "warning");

        window.location.href = "strongmfa.html";
        return;
    }

    // ==========================
    // NORMAL LOGIN SUCCESS (allow / monitor — no step-up status)
    // ==========================

    if (data.access_token) {

        ztaNotify("Login successful. Access granted.", "success");

        ztaNotify("Credentials verified by backend", "success");
        ztaNotify("Collecting behavioral metadata...", "success");
        ztaNotify("Evaluating risk score using ZTA engine...", "success");

        localStorage.setItem("access_token", data.access_token);
        localStorage.removeItem("pending_mfa_token");

        window.location.href = "dashboard.html";
        return;
    }

    // ==========================
    // LOGIN FAILURE
    // ==========================

    ztaNotify("Login failed: Invalid credentials", "error");

    document.getElementById("message").innerText =
        data.detail || "Invalid credentials";

    isSubmitting = false;
    document.getElementById("loginBtn").disabled = false;

};

</script>

</body>
</html>
