<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manager Approval Dashboard</title>
<link rel="stylesheet" href="style.css?v=2">
</head>

<body class="app-body">

<div class="dashboard">
<h2>Pending Approval Requests</h2>

<div class="approval-container" id="approvalContainer">
    <!-- Cards will be inserted here -->
</div>
</div>

<div id="zta-notify-container"></div>

<script src="guard.js"></script>
<script src="zta_notify.js"></script>

<script>

const token = localStorage.getItem("access_token");

function getRiskClass(score) {
    if (score <= 40) return "low-risk";
    if (score <= 70) return "medium-risk";
    return "high-risk";
}

async function loadApprovals() {

    const response = await fetch("/api/approvals/pending", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await response.json();

    const container = document.getElementById("approvalContainer");
    container.innerHTML = "";

    if (!data.pending_requests || data.pending_requests.length === 0) {
        container.innerHTML = `<div class="no-requests">No pending approvals</div>`;
        return;
    }

    data.pending_requests.forEach(req => {

        const card = document.createElement("div");
        card.className = "approval-card";

        card.innerHTML = `
            <div class="card-header">
                <div class="user-name">${req.username}</div>
                <div class="risk-badge ${getRiskClass(req.risk_score)}">
                    Risk: ${req.risk_score}
                </div>
            </div>

            <div class="details-grid">
                <div><strong>User ID:</strong> ${req.user_id}</div>
                <div><strong>Resource:</strong> ${req.resource}</div>
                <div><strong>Requested At:</strong> ${req.requested_at}</div>
                <div><strong>IP Address:</strong> ${req.ip_address || "N/A"}</div>
                <div><strong>Location:</strong> ${req.location_country || "Unknown"}</div>
                <div><strong>Device:</strong> ${req.device_id || "Unknown"}</div>
            </div>

            <div class="action-buttons">
                <button class="approve-btn" onclick="approve(${req.id})">Approve</button>
                <button class="reject-btn" onclick="reject(${req.id})">Reject</button>
            </div>
        `;

        container.appendChild(card);
    });
}

async function approve(id) {
    const res = await fetch(`/api/approvals/${id}/approve`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token
        }
    });
    if (res.ok) {
        if (typeof ztaNotify === "function") ztaNotify("Request approved.", "success");
    } else {
        let msg = "Approve failed";
        try {
            const err = await res.json();
            msg = err.detail || msg;
        } catch (e) {}
        if (typeof ztaNotify === "function") ztaNotify(msg, "error");
    }
    loadApprovals();
}

async function reject(id) {
    const res = await fetch(`/api/approvals/${id}/reject`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token
        }
    });
    if (res.ok) {
        if (typeof ztaNotify === "function") ztaNotify("Request rejected.", "warning");
    } else {
        let msg = "Reject failed";
        try {
            const err = await res.json();
            msg = err.detail || msg;
        } catch (e) {}
        if (typeof ztaNotify === "function") ztaNotify(msg, "error");
    }
    loadApprovals();
}

// Ensure user is allowed to access manager approvals.
async function bootstrap(){
    await ztaGuard("/api/approvals/pending", { redirectOnForbidden: "dashboard.html" });
    loadApprovals();
}

bootstrap();

</script>
</body>
</html>
