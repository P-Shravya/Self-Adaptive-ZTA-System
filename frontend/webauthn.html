<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strong Authentication - WebAuthn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.35);
    }
    h1 { font-size: 1.4rem; margin: 0 0 8px; color: #f9fafb; }
    p.desc { margin: 0 0 20px; font-size: 0.95rem; color: #9ca3af; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .status-badge.registered   { background: #14532d; color: #4ade80; }
    .status-badge.unregistered { background: #451a03; color: #fb923c; }
    .buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    button {
      appearance: none; border: none; border-radius: 999px;
      padding: 10px 16px; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    button.primary {
      background: linear-gradient(135deg, #2563eb, #22c55e);
      color: white; box-shadow: 0 10px 30px rgba(37,99,235,0.4);
    }
    button.secondary {
      background: rgba(15,23,42,0.9); color: #e5e7eb;
      border: 1px solid rgba(148,163,184,0.6);
    }
    button:disabled { opacity: 0.45; cursor: default; box-shadow: none; transform: none; }
    button:not(:disabled):hover { transform: translateY(-1px); }
    .message { min-height: 48px; font-size: 0.9rem; line-height: 1.4; white-space: pre-line; }
    .message.info    { color: #93c5fd; }
    .message.success { color: #4ade80; }
    .message.error   { color: #f97373; }
    .message.warning { color: #fbbf24; }
    .support-warning { margin-top: 10px; font-size: 0.85rem; color: #facc15; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Strong Authentication Required</h1>
    <p class="desc">
      Use Windows Hello (face / fingerprint / PIN) to verify your identity.
      If this is your first time, register your device below.
    </p>

    <div id="deviceStatus"></div>

    <div class="buttons">
      <button id="registerBtn" class="secondary" type="button">🔑 Register Device</button>
      <button id="verifyBtn"   class="primary"   type="button">✅ Verify Identity</button>
    </div>

    <div id="message" class="message info">Checking your device status…</div>
    <div id="supportWarning" class="support-warning" style="display:none;">
      This browser does not fully support WebAuthn. Use Edge or Chrome on Windows.
    </div>
  </div>

  <script>

    // ══════════════════════════════════════════
    // BUG 1 + 7 FIX: getUserId reads mfa_user
    // fallback when no access_token exists yet
    // (during login → strong_mfa flow)
    // Always returns an integer or null.
    // ══════════════════════════════════════════
    function getUserId() {
      // Try JWT first (post-auth guard.js flow)
      const token = localStorage.getItem("access_token");
      if (token) {
        try {
          const payload = JSON.parse(atob(token.split('.')[1]));
          if (payload && payload.sub != null) {
            return parseInt(payload.sub, 10);   // BUG 7 FIX: ensure int
          }
        } catch(e) {}
      }
      // BUG 1 FIX: fallback to mfa_user set by login.html on strong_mfa_required
      const mfaUser = localStorage.getItem("mfa_user");
      if (mfaUser) return parseInt(mfaUser, 10);
      return null;
    }

    // ── base64url helpers ──
    function b64urlToUint8(b64url) {
      const pad = '='.repeat((4 - (b64url.length % 4)) % 4);
      const b64 = (b64url.replace(/-/g, '+').replace(/_/g, '/')) + pad;
      const raw = window.atob(b64);
      return Uint8Array.from(raw, c => c.charCodeAt(0));
    }

    function bufToB64url(buf) {
      const bytes = new Uint8Array(buf);
      let bin = '';
      bytes.forEach(b => bin += String.fromCharCode(b));
      return window.btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function setMessage(text, type = 'info') {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
    }

    function setBusy(busy) {
      document.getElementById('registerBtn').disabled = busy;
      document.getElementById('verifyBtn').disabled   = busy;
    }

    // ══════════════════════════════════════════
    // BUG 8 FIX: Check device registration status
    // on page load — show badge and guide user
    // ══════════════════════════════════════════
    async function checkRegistrationStatus() {
      const user_id = getUserId();
      if (!user_id) {
        setMessage('Not logged in. Redirecting…', 'error');
        setTimeout(() => window.location.href = 'login.html', 1500);
        return;
      }

      try {
        // Probe authenticate-options: 404 = not registered, 200 = registered
        const res = await fetch('/webauthn/authenticate-options', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id })
        });

        const badge = document.getElementById('deviceStatus');
        if (res.ok) {
          badge.innerHTML = '<span class="status-badge registered">✔ Device Registered</span>';
          setMessage('Your device is registered. Click Verify Identity to authenticate with Windows Hello.', 'info');
          // Store pre-fetched options so Verify doesn't need a second call
          window._authOptions = await res.json();
        } else if (res.status === 404) {
          badge.innerHTML = '<span class="status-badge unregistered">⚠ No Device Registered</span>';
          setMessage('No device registered yet. Click Register Device to set up Windows Hello, then Verify Identity.', 'warning');
          document.getElementById('verifyBtn').disabled = true;
          window._authOptions = null;
        } else {
          setMessage('Could not check device status. You may still try registering.', 'warning');
        }
      } catch(err) {
        setMessage('Network error checking device status: ' + err.message, 'error');
      }
    }

    // ══════════════════════════════════════════
    // REGISTER DEVICE
    // ══════════════════════════════════════════
    async function registerDevice() {
      const user_id = getUserId();
      if (!user_id) {
        setMessage('Not logged in. No user ID found.', 'error');
        return;
      }

      try {
        setBusy(true);
        setMessage('Requesting registration options from server…', 'info');

        const optRes = await fetch('/webauthn/register-options', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id })
        });

        if (!optRes.ok) {
          throw new Error('Failed to get registration options (' + optRes.status + ').');
        }

        const options = await optRes.json();

        // Convert base64url → ArrayBuffer
        const publicKey = {
          ...options,
          challenge: b64urlToUint8(options.challenge),
          user: { ...options.user, id: b64urlToUint8(options.user.id) },
          excludeCredentials: (options.excludeCredentials || []).map(c => ({
            ...c, id: b64urlToUint8(c.id)
          }))
        };

        setMessage('Opening Windows Hello for device registration…', 'info');
        const credential = await navigator.credentials.create({ publicKey });

        if (!credential) throw new Error('Windows Hello returned no credential.');

        const att = credential.response;
        const regData = {
          user_id,
          id:     credential.id,
          rawId:  bufToB64url(credential.rawId),
          type:   credential.type,
          response: {
            clientDataJSON:    bufToB64url(att.clientDataJSON),
            attestationObject: bufToB64url(att.attestationObject),
          }
        };

        setMessage('Sending registration to server…', 'info');
        const verRes = await fetch('/webauthn/register-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(regData)
        });

        if (!verRes.ok) {
          const txt = await verRes.text().catch(() => '');
          throw new Error('Server rejected registration: ' + txt);
        }

        setMessage('✅ Device registered successfully!\nNow click Verify Identity to authenticate.', 'success');

        // Re-check status to enable Verify button
        await checkRegistrationStatus();

      } catch(err) {
        console.error(err);
        if (err.name === 'NotAllowedError') {
          setMessage('Registration cancelled or timed out. Please try again.', 'warning');
        } else {
          setMessage('Registration error: ' + err.message, 'error');
        }
      } finally {
        setBusy(false);
      }
    }

    // ══════════════════════════════════════════
    // VERIFY IDENTITY
    // Uses pre-fetched options from checkRegistrationStatus
    // to avoid double-calling authenticate-options
    // ══════════════════════════════════════════
    async function verifyIdentity() {
      const user_id = getUserId();
      if (!user_id) {
        setMessage('Not logged in. No user ID found.', 'error');
        return;
      }

      try {
        setBusy(true);
        setMessage('Opening Windows Hello to verify your identity…', 'info');

        // Use pre-fetched options or fetch fresh if needed
        let options = window._authOptions;
        if (!options) {
          setMessage('Fetching authentication options…', 'info');
          const optRes = await fetch('/webauthn/authenticate-options', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id })
          });
          if (!optRes.ok) {
            const err = await optRes.json().catch(() => ({}));
            throw new Error(err.detail || 'Failed to get auth options.');
          }
          options = await optRes.json();
        }

        // Convert base64url → ArrayBuffer
        const publicKey = {
          ...options,
          challenge: b64urlToUint8(options.challenge),
          allowCredentials: (options.allowCredentials || []).map(c => ({
            ...c, id: b64urlToUint8(c.id)
          }))
        };

        const assertion = await navigator.credentials.get({ publicKey });
        if (!assertion) throw new Error('Windows Hello returned no assertion.');

        const ar = assertion.response;
        const authData = {
          user_id,
          id:     assertion.id,
          rawId:  bufToB64url(assertion.rawId),
          type:   assertion.type,
          response: {
            clientDataJSON:    bufToB64url(ar.clientDataJSON),
            authenticatorData: bufToB64url(ar.authenticatorData),
            signature:         bufToB64url(ar.signature),
            userHandle:        ar.userHandle ? bufToB64url(ar.userHandle) : null,
          }
        };

        setMessage('Verifying with server…', 'info');
        const verRes = await fetch('/webauthn/authenticate-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(authData)
        });

        if (!verRes.ok) {
          const err = await verRes.json().catch(() => ({}));
          throw new Error(err.detail || 'Server rejected verification.');
        }

        const result = await verRes.json();

        // Save upgraded token (has webauthn: true claim)
        if (result.access_token) {
          localStorage.setItem("access_token", result.access_token);
        }
        // Clear mfa_user now that auth is complete
        localStorage.removeItem("mfa_user");

        setMessage('✅ Identity verified! Redirecting…', 'success');

        setTimeout(() => {
          const redirect = localStorage.getItem("post_auth_redirect") || "dashboard.html";
          localStorage.removeItem("post_auth_redirect");
          window.location.href = redirect;
        }, 800);

      } catch(err) {
        console.error(err);
        // Reset pre-fetched options so next click fetches fresh ones
        window._authOptions = null;
        if (err.name === 'NotAllowedError') {
          setMessage('Verification cancelled or timed out. Please try again.', 'warning');
        } else {
          setMessage('Verification error: ' + err.message, 'error');
        }
      } finally {
        setBusy(false);
      }
    }

    // ══════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════
    (function init() {
      const supportWarning = document.getElementById('supportWarning');

      if (!window.PublicKeyCredential || !navigator.credentials) {
        supportWarning.style.display = 'block';
        setMessage('This browser does not support WebAuthn. Use Edge or Chrome on Windows.', 'error');
        document.getElementById('registerBtn').disabled = true;
        document.getElementById('verifyBtn').disabled   = true;
        return;
      }

      document.getElementById('registerBtn').addEventListener('click', registerDevice);
      document.getElementById('verifyBtn').addEventListener('click', verifyIdentity);

      // BUG 8 FIX: check device status on load
      checkRegistrationStatus();
    })();

  </script>
</body>
</html>
